name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Platform-agnostic lint (runs once) ────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

  # ── Platform-specific Rust tests ──────────────────────────────────────
  rust-test:
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --locked

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Python bindings: oldest + newest Python per OS ────────────────────
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Add venv to PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Add venv to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "${{ github.workspace }}/.venv/Scripts" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install dependencies
        run: pip install maturin polars pyarrow pandas pytest

      - name: Build Python bindings
        run: maturin develop --release

      - name: Run tests
        run: pytest tests/ -v
