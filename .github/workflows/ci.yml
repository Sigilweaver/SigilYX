name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/workflows/publish-*.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/workflows/publish-*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: true

jobs:
  lint:
    name: Lint & audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: ./.github/actions/setup-sccache
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2026-0176/-0177 (pyo3 OOB read / missing Sync bound): fixed in
          # pyo3 >=0.29, but pyo3-polars's latest release (0.27.0) hard-pins pyo3
          # ^0.28. pyo3-polars was folded into the pola-rs/polars monorepo, whose
          # HEAD already requires pyo3 = "0.29" - so this is already fixed upstream,
          # just not yet cut into a pyo3-polars/polars release. Revisit on the next
          # pyo3-polars bump.
          # RUSTSEC-2026-0194/-0195 (quick-xml quadratic/DoS): the copy SigilYX
          # actually compiles is patched (see quick-xml = "0.41" in sigilyx/Cargo.toml).
          # The flagged instance is a second, unreachable quick-xml pulled in by
          # object_store, itself an optional dependency of polars-io gated behind
          # the "cloud" feature, which nothing here enables (verified via
          # `cargo tree -i` returning empty for reqwest/object_store on any target).
          # Blocked on object_store's own quick-xml bump upstream.
          ignore: RUSTSEC-2026-0176,RUSTSEC-2026-0177,RUSTSEC-2026-0194,RUSTSEC-2026-0195

  rust-test:
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # Mirrors publish-pypi.yml's wheel-build matrix: ubuntu-latest,
        # macos-14 (aarch64), windows-latest (x64).
        os: [ubuntu-latest, macos-14, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-sccache
      - uses: Swatinem/rust-cache@v2

      - name: Test core crate
        run: cargo test -p sigilyx --locked

  python-test:
    name: Python test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # Mirrors publish-pypi.yml's wheel-build matrix: ubuntu-latest,
        # macos-14 (aarch64), windows-latest (x64).
        os: [ubuntu-latest, macos-14, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-sccache
      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v7

      - name: Build and test
        run: |
          uv venv --python 3.12
          # uv/venv put the activate script under bin/ on Linux/macOS and
          # Scripts/ on Windows; Scripts/activate (no extension) is the
          # bash-compatible variant meant for Git Bash, which is what
          # windows-latest runners give us under `shell: bash`.
          if [ -f .venv/bin/activate ]; then
            source .venv/bin/activate
          else
            source .venv/Scripts/activate
          fi
          uv pip install maturin polars pyarrow pandas pytest
          maturin develop --release
          pytest tests/ -v
