name: Publish to crates.io

on:
  release:
    types: [published]

  # Allow manual trigger for testing
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish sigilyx crate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          perl -i -pe "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" \
            sigilyx/Cargo.toml sigilyx-python/Cargo.toml pyproject.toml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Regenerate lock file after version sync
        if: startsWith(github.ref, 'refs/tags/v')
        run: cargo generate-lockfile

      - name: Verify crate builds
        run: cargo build --release --locked -p sigilyx

      - name: Dry-run publish
        run: cargo publish --dry-run --allow-dirty --locked -p sigilyx

      - name: Publish to crates.io
        run: cargo publish --allow-dirty --locked -p sigilyx
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
