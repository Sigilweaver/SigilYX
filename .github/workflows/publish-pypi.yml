name: Publish to PyPI

on:
  release:
    types: [published]

  # Allow manual trigger for testing
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          perl -i -pe "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" \
            sigilyx/Cargo.toml sigilyx-python/Cargo.toml pyproject.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheel (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64
          # Windows x86_64
          - os: windows-latest
            target: x64
          # macOS x86_64 (cross-compiled from ARM runner)
          - os: macos-latest
            target: x86_64
          # macOS ARM64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          perl -i -pe "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" \
            sigilyx/Cargo.toml sigilyx-python/Cargo.toml pyproject.toml

      # Linux: manylinux containers bundle all Python versions — only need one here.
      # Windows/macOS: maturin uses the installed system interpreters, so install all targets.
      - uses: actions/setup-python@v5
        if: matrix.os != 'ubuntu-latest'
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13

      - uses: actions/setup-python@v5
        if: matrix.os == 'ubuntu-latest'
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdist, build-wheels]
    environment: release
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted publishing — no token needed if configured in PyPI.
        # If you prefer a token instead, comment out the permissions block
        # above and uncomment the following:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
